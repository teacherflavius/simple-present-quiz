<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IN, ON, AT Quiz</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="auth.js"></script>
  <script src="supabase_results.js"></script>
  <script src="quiz_core.js?v=no-switch-student-20260426"></script>
  <script src="notify_teacher.js"></script>
  <style>
    .top-nav {
      width: 100%;
      max-width: 520px;
      margin: 0 auto 20px;
      font-family: Georgia, serif;
    }

    .top-nav .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(129,140,248,0.35);
      border-radius: 10px;
      padding: 9px 18px;
      color: #818cf8;
      font-size: 14px;
      font-family: Georgia, serif;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .top-nav .btn-back:hover {
      background: rgba(129,140,248,0.12);
      border-color: #818cf8;
      transform: translateY(-1px);
    }

    #root > div > div:first-child {
      display: none !important;
    }

    .video-section {
      width: 100%;
      max-width: 520px;
      margin: 0 auto 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(12px);
      font-family: Georgia, serif;
    }

    .video-section p {
      color: #f1f5f9;
      font-size: 16px;
      line-height: 1.5;
      text-align: center;
      margin: 0 0 14px;
      font-weight: bold;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 14px;
      background: #0f172a;
      border: 1px solid rgba(129,140,248,0.25);
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="top-nav">
    <a href="index.html" class="btn-back">INÍCIO</a>
  </div>

  <div class="video-section">
    <p>Assista esse vídeo antes de responder o quiz</p>
    <div class="video-wrapper">
      <iframe
        src="https://www.youtube.com/embed/TdspSfiGF8s"
        title="Vídeo sobre IN, ON e AT"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <div id="root"></div>
  <script>
    QuizCore.renderQuiz({
      title: "IN · ON · AT",
      subtitle: "Escolha a preposição correta",
      feedbackPerfect: "Perfeito! Você domina as preposições IN, ON e AT!",
      questions: [
        { question: "My birthday is ___ July.", options: ["in", "on", "at", "to"], answer: "in", explanation: "Usamos IN com meses e anos: in July, in 2024." },
        { question: "She is ___ home right now.", options: ["in", "on", "at", "of"], answer: "at", explanation: "Usamos AT para locais específicos e expressões fixas: at home, at school." },
        { question: "The book is ___ the table.", options: ["in", "on", "at", "by"], answer: "on", explanation: "Usamos ON para superfícies: on the table, on the floor." },
        { question: "We have class ___ Monday.", options: ["in", "on", "at", "for"], answer: "on", explanation: "Usamos ON com dias da semana: on Monday, on Friday." },
        { question: "There is a cat ___ the box.", options: ["on", "at", "in", "by"], answer: "in", explanation: "Usamos IN para indicar algo dentro de um espaço fechado." },
        { question: "The party starts ___ 7 o'clock.", options: ["in", "on", "at", "to"], answer: "at", explanation: "Usamos AT com horas específicas: at 7 o'clock, at noon." },
        { question: "I live ___ a small apartment.", options: ["on", "at", "by", "in"], answer: "in", explanation: "Usamos IN para indicar que estamos dentro de um lugar." },
        { question: "She was born ___ the 5th of March.", options: ["in", "at", "on", "by"], answer: "on", explanation: "Usamos ON com datas específicas: on the 5th of March." },
        { question: "The children are ___ school now.", options: ["in", "on", "at", "to"], answer: "at", explanation: "Usamos AT com lugares de atividade: at school, at work, at the airport." },
        { question: "There is a picture ___ the wall.", options: ["in", "at", "by", "on"], answer: "on", explanation: "Usamos ON para superfícies verticais também: on the wall, on the door." }
      ]
    });
  </script>
</body>
</html>
